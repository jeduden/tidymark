front-matter: true

rules:
  line-length:
    max: 80
    exclude:
      - code-blocks
      - tables
      - urls
  heading-style:
    style: atx
  heading-increment: true
  first-line-heading:
    level: 1
  empty-section-body:
    min-level: 2
    max-level: 6
    allow-marker: allow-empty-section
  no-duplicate-headings: true
  no-trailing-spaces: true
  no-hard-tabs: true
  no-multiple-blanks:
    max: 1
  single-trailing-newline: true
  fenced-code-style:
    style: backtick
  fenced-code-language: true
  no-bare-urls: true
  blank-line-around-headings: true
  blank-line-around-lists: true
  blank-line-around-fenced-code: true
  list-indent:
    spaces: 2
  max-file-length:
    max: 300
  table-format:
    pad: 1
  table-readability:
    max-column-width-ratio: 60
    max-columns: 8
    max-rows: 30
    max-words-per-cell: 30
  cross-file-reference-integrity:
    include: []
    exclude: []
    strict: true
  token-budget:
    max: 8000
    mode: heuristic
    tokens-per-word: 1.33
    tokenizer: builtin
    encoding: cl100k_base
  no-trailing-punctuation-in-heading: true
  no-emphasis-as-heading: true
  paragraph-readability:
    max-index: 14.0
    min-words: 20
  paragraph-structure:
    max-sentences: 6
    max-words-per-sentence: 40
  # Experimental rule: keep disabled until classifier-backed scoring is ready.
  conciseness-scoring: false
  directory-structure:
    allowed:
      - "."
      - "docs/**"
      - "plan/**"
      - "demo/**"
      - "internal/rules/**"
      - "internal/metrics/**"
      - "internal/concepts/**"
      - ".claude/**"
      - ".github/**"
  catalog: true
  required-structure: true
  include: true
  unclosed-code-block: true

overrides:
  - files: ["CLAUDE.md"]
    rules:
      line-length:
        max: 200
        exclude:
          - code-blocks
          - tables
          - urls
      blank-line-around-lists: false
  - files: [".claude/skills/*/SKILL.md",
            ".github/copilot-pr-fixup.md",
            ".github/AGENTS-PR-FIXUP.md"]
    rules:
      max-file-length:
        max: 600
  - files: [".claude/skills/*/SKILL.md"]
    rules:
      required-structure:
        schema: .claude/skills/proto.md
      first-line-heading: false
      heading-increment: false
  - files: ["AGENTS.md", ".github/copilot-instructions.md"]
    rules:
      line-length:
        max: 200
        exclude:
          - code-blocks
          - tables
          - urls
      blank-line-around-lists: false
      blank-line-around-headings: false
      max-file-length:
        max: 600
      first-line-heading:
        level: 1
      cross-file-reference-integrity: true
      catalog: false
  - files: ["docs/development/index.md"]
    rules:
      first-line-heading: false
      heading-increment: false
  - files: ["internal/rules/index.md"]
    rules:
      table-readability:
        max-rows: 40
  - files: ["README.md"]
    rules:
      line-length:
        max: 100
        exclude:
          - code-blocks
          - tables
          - urls
      max-file-length:
        max: 350
      table-readability:
        max-rows: 40
      paragraph-structure:
        max-sentences: 30
  - files: ["PLAN.md"]
    rules:
      table-readability:
        max-rows: 80
        max-column-width-ratio: 65
  - files: ["internal/rules/MDS002-heading-style/good/setext.md"]
    rules:
      heading-style:
        style: setext
  - files: ["internal/rules/MDS010-fenced-code-style/good/tilde.md"]
    rules:
      fenced-code-style:
        style: tilde
  - files: ["internal/rules/MDS016-list-indent/good/spaces-4.md"]
    rules:
      list-indent:
        spaces: 4
  - files: ["docs/background/*.md"]
    rules:
      line-length:
        stern: true
      max-file-length:
        max: 1000
      token-budget:
        max: 12000
        mode: heuristic
        tokens-per-word: 1.33
        tokenizer: builtin
        encoding: cl100k_base
  - files: ["docs/development/pr-fixup-workflow.md"]
    rules:
      first-line-heading: false
      heading-increment: false
      max-file-length:
        max: 330
  - files: ["docs/guides/*.md"]
    rules:
      line-length:
        max: 600
        exclude:
          - code-blocks
          - tables
          - urls
      max-file-length:
        max: 600
      token-budget:
        max: 12000
        mode: heuristic
        tokens-per-word: 1.33
        tokenizer: builtin
        encoding: cl100k_base
      paragraph-readability:
        max-index: 24.0
        min-words: 20
      paragraph-structure:
        max-sentences: 12
        max-words-per-sentence: 120
  - files: ["docs/security/[0-9]*.md"]
    rules:
      line-length:
        max: 600
        exclude:
          - code-blocks
          - tables
          - urls
      required-structure:
        schema: docs/security/proto.md
      max-file-length:
        max: 1000
      paragraph-readability: false
      paragraph-structure: false
      no-emphasis-as-heading: false
      token-budget:
        max: 16000
        mode: heuristic
        tokens-per-word: 1.33
        tokenizer: builtin
        encoding: cl100k_base
  - files: ["docs/research/**"]
    rules:
      first-line-heading: false
      heading-increment: false
      paragraph-readability: false
      paragraph-structure: false
      token-budget: false
      max-file-length: false
      cross-file-reference-integrity: false
      required-structure: false

ignore:
  - "demo/**"
  - "internal/rules/*/bad/**"
  - "internal/rules/*/bad.md"
  - "internal/rules/*/good/**"
  - "internal/rules/*/fixed/**"
  - ".claude/worktrees/**"

kinds:
  proto:
    rules:
      # proto.md files lead with directives and placeholder
      # headings rather than a content level-1 heading; the
      # opt-in placeholder vocabulary cannot rewrite that
      # structure, so the structural heading rules step aside
      # for this kind.
      first-line-heading: false
      heading-increment: false
      blank-line-around-headings: false
      no-emphasis-as-heading: false
      # Links in proto.md bodies are placeholder text
      # (e.g. `NAME`, not `{name}`) — they aren't real
      # repo paths and var-token cannot match them. Plan
      # 98's archetype-to-kinds rename will eliminate the
      # one remaining placeholder link.
      cross-file-reference-integrity: false
      paragraph-readability: false
      paragraph-structure: false
  plan:
    rules:
      required-structure:
        schema: plan/proto.md
  rule-readme:
    rules:
      required-structure:
        schema: internal/rules/proto.md
  skill:
    rules:
      required-structure:
        schema: .claude/skills/proto.md
  security-note:
    rules:
      required-structure:
        schema: docs/security/proto.md

# kind-assignment order matters: proto applies first so each
# proto.md also picks up its project kind, whose
# required-structure.schema points back at the file itself.
# That marks proto.md as its own schema, suppressing the
# "<?require?> outside a schema" warning and skipping
# structural self-validation.
kind-assignment:
  - files: ["**/proto.md"]
    kinds: [proto]
  - files: ["plan/proto.md", "plan/[0-9]*_*.md"]
    kinds: [plan]
  - files: ["internal/rules/proto.md", "internal/rules/MDS*/README.md"]
    kinds: [rule-readme]
  - files: [".claude/skills/proto.md", ".claude/skills/*/SKILL.md"]
    kinds: [skill]
  - files: ["docs/security/proto.md", "docs/security/[0-9]*.md"]
    kinds: [security-note]

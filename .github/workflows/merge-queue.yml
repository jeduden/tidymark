name: Merge Queue

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      batch_prs:
        type: string
        required: false
      bisect:
        type: boolean
        default: true

concurrency:
  group: merge-queue
  cancel-in-progress: false

# Only merge-queue-action below needs MERGE_QUEUE_TOKEN's elevated
# scope; the rest of the job runs under the default GITHUB_TOKEN
# capped at read-only.
permissions:
  contents: read

jobs:
  queue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # Default GITHUB_TOKEN (constrained by the permissions: block
          # above) is enough for read-only checkout. MERGE_QUEUE_TOKEN
          # stays scoped to the merge-queue-action step that actually
          # needs branch-protection bypass.
          persist-credentials: false

      - name: Install mdsmith merge driver and pre-merge-commit hook
        env:
          MDSMITH_VERSION: v0.12.0
          MDSMITH_SHA256: a93f966ae68447b5de18fbb3d57f4a6122f5d364a91341e31fd7cfc3c3881f48
        run: |
          # Install to a stable path that will persist for the hook to use
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/jeduden/mdsmith/releases/download/${MDSMITH_VERSION}/mdsmith-linux-amd64" \
            -o "$HOME/.local/bin/mdsmith"
          echo "${MDSMITH_SHA256}  $HOME/.local/bin/mdsmith" | sha256sum -c
          chmod +x "$HOME/.local/bin/mdsmith"
          "$HOME/.local/bin/mdsmith" merge-driver install
          "$HOME/.local/bin/mdsmith" pre-merge-commit install
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - uses: jeduden/merge-queue-action@389ad414544a693f6c98e0dfdca349007b64d0df #v0.7.8
        with:
          token: ${{ secrets.MERGE_QUEUE_TOKEN }}
          ci_workflow: .github/workflows/ci.yml
          batch_size: "5"
          bisect: ${{ github.event.inputs.bisect }}
          batch_prs: ${{ github.event.inputs.batch_prs }}

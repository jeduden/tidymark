name: Merge Queue

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      batch_prs:
        type: string
        required: false
      bisect:
        type: boolean
        default: false

concurrency:
  group: merge-queue
  cancel-in-progress: false

jobs:
  queue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.MERGE_QUEUE_TOKEN }}

      - name: Install mdsmith merge driver
        env:
          MDSMITH_VERSION: v0.7.0
          MDSMITH_SHA256: 4ace848c804ce991b6d8a1bf80998e2baaf2fb026f6f240fed3155823d5cf305
        run: |
          curl -fsSL "https://github.com/jeduden/mdsmith/releases/download/${MDSMITH_VERSION}/mdsmith-linux-amd64" \
            -o "$RUNNER_TEMP/mdsmith"
          echo "${MDSMITH_SHA256}  $RUNNER_TEMP/mdsmith" | sha256sum -c
          chmod +x "$RUNNER_TEMP/mdsmith"
          "$RUNNER_TEMP/mdsmith" merge-driver install
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - uses: jeduden/merge-queue-action@3be8077b142e4057d2fc097635d1ab6ada2bbbf5 # v0.7.1
        with:
          token: ${{ secrets.MERGE_QUEUE_TOKEN }}
          ci_workflow: .github/workflows/ci.yml
          batch_size: "5"
          bisect: ${{ github.event.inputs.bisect }}
          batch_prs: ${{ github.event.inputs.batch_prs }}

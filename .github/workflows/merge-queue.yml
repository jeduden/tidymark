name: Merge Queue

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      batch_prs:
        type: string
        required: false
      bisect:
        type: boolean
        default: false

concurrency:
  group: merge-queue
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: write
  issues: write

jobs:
  queue:
    runs-on: ubuntu-latest
    steps:
      - uses: jeduden/merge-queue-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ci_workflow: .github/workflows/ci.yml
          batch_size: "5"
          bisect: ${{ github.event.inputs.bisect || false }}
          batch_prs: ${{ github.event.inputs.batch_prs || '' }}

name: Merge Queue

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      batch_prs:
        type: string
        required: false
      bisect:
        type: boolean
        default: false

concurrency:
  group: merge-queue
  cancel-in-progress: false

permissions: {}

jobs:
  queue:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'queue'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
      issues: write
    steps:
      - uses: jeduden/merge-queue-action@52c1f24b19880bf2f68a422d7d53551f19ffe4d0 # v0.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ci_workflow: .github/workflows/ci.yml
          batch_size: "5"
          bisect: ${{ github.event.inputs.bisect || false }}
          batch_prs: ${{ github.event.inputs.batch_prs || '' }}

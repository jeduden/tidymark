name: Secret Rotation Reminder

# Reads `docs/development/secret-rotations.md` and opens a GitHub
# issue when any tracked secret is within 30 days of its computed
# expiry. Idempotent: a second run that finds an open issue for the
# same `last-rotated` date does not create a duplicate.
#
# See docs/development/secret-rotations.md for the rotation procedure
# and the front-matter schema this workflow consumes.

on:
  schedule:
    # 09:00 UTC on the first day of every month.
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    if: github.repository == 'jeduden/mdsmith'
    # `issues: write` lets the script open and label reminder issues
    # via the `gh` CLI. `contents: read` is inherited from the
    # workflow-level default above for the checkout step.
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install PyYAML
        # `python -m pip` ensures the install lands in the
        # interpreter selected by actions/setup-python above,
        # not whichever pip happens to be first on PATH.
        # `--disable-pip-version-check` suppresses the routine
        # "consider upgrading pip" line so the step's log only
        # carries actionable output.
        run: |
          python -m pip install \
            --disable-pip-version-check \
            --no-deps pyyaml==6.0.2
      - name: Open reminder issues for due secrets
        # GH_TOKEN is the standard envvar `gh` reads when no
        # `--token` flag is supplied. The default GITHUB_TOKEN
        # has the `issues: write` permission granted on the job.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/check-secret-rotations.py

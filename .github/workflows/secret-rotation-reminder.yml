name: Secret Rotation Reminder

# Globs `docs/development/secret-rotations/*.md` and opens a
# GitHub issue when any tracked secret is within 30 days of its
# computed expiry (per the `lastRotated` + `periodDays` front
# matter). Idempotent: a second run that finds an open issue for
# the same secret + lastRotated date does not create a duplicate.
#
# See docs/development/secret-rotations.md for the rotation
# procedure and the front-matter schema this workflow consumes.

on:
  schedule:
    # 09:00 UTC on the first day of every month.
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions:
  # `contents: read` is the only workflow-level scope. GitHub
  # auto-narrows every other scope to `none` once any permission
  # is set explicitly, but the explicit `issues: none` here
  # documents the intent so a future maintainer adding a second
  # job inherits the minimum and has to opt into `issues: write`
  # per-job (as the `remind` job below already does).
  contents: read
  issues: none

jobs:
  remind:
    runs-on: ubuntu-latest
    if: github.repository == 'jeduden/mdsmith'
    # `issues: write` lets the script open and label reminder issues
    # via the `gh` CLI. `contents: read` is inherited from the
    # workflow-level default above for the checkout step.
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Open reminder issues for due secrets
        # `gh` reads GH_TOKEN when no `--token` flag is supplied.
        # `github.token` is the workflow-injected token (NOT a
        # user-configured secret) and carries the `issues: write`
        # permission granted on this job.
        env:
          GH_TOKEN: ${{ github.token }}
          # Default the reminder assignee to the repository owner.
          # `github.repository_owner` is auto-set on every workflow
          # run. If the repo ever moves under an org whose login
          # GitHub rejects as an assignee, override this to a real
          # user login (or to the empty string to skip assignment
          # entirely — the issue still surfaces via the
          # secret-rotation label subscribers).
          REMINDER_ASSIGNEE: ${{ github.repository_owner }}
        run: go run ./cmd/mdsmith-release check-secret-rotations

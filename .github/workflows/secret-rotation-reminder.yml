name: Secret Rotation Reminder

# Reads `docs/development/secret-rotations.md` and opens a GitHub
# issue when any tracked secret is within 30 days of its computed
# expiry. Idempotent: a second run that finds an open issue for the
# same `last-rotated` date does not create a duplicate.
#
# See docs/development/secret-rotations.md for the rotation procedure
# and the front-matter schema this workflow consumes.

on:
  schedule:
    # 09:00 UTC on the first day of every month.
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    if: github.repository == 'jeduden/mdsmith'
    # `issues: write` lets the script open and label reminder issues
    # via the `gh` CLI. `contents: read` is inherited from the
    # workflow-level default above for the checkout step.
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # `no-cache: true` matches the rest of the supply-chain-
      # sensitive workflows (zizmor's cache-poisoning rule flags
      # the GitHub Actions tool cache); the action still downloads
      # and verifies the bun release from oven-sh/bun for each run.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"
          no-cache: true
      - name: Install script dependencies
        working-directory: .github/scripts
        # `--frozen-lockfile` enforces bun.lock; `--ignore-scripts`
        # neutralizes lifecycle hooks from transitive deps (the
        # shai-hulud / TanStack-class threat).
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Open reminder issues for due secrets
        # `gh` reads GH_TOKEN when no `--token` flag is supplied.
        # `github.token` is the workflow-injected token (NOT a
        # user-configured secret) and carries the `issues: write`
        # permission granted on this job.
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun run .github/scripts/check-secret-rotations.ts

name: Demo GIF

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  record:
    # Skip if the push was made by the CI bot to avoid loops.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      # Credentials intentionally persisted — needed for git push.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - name: Build mdsmith
        run: go build -o mdsmith ./cmd/mdsmith

      - name: Install VHS runtime dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg chromium-browser || sudo apt-get install -y -qq ffmpeg chromium
          curl -fsSL -o /tmp/ttyd \
            "https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64"
          sudo install /tmp/ttyd /usr/local/bin/ttyd

      - name: Install VHS
        run: go install github.com/charmbracelet/vhs@v0.10.0

      - name: Record demo in isolated directory
        run: |
          # Run VHS in a temp directory so demo.tape commands
          # cannot modify the repo working tree (git hooks,
          # workflow files, source code).
          iso="$(mktemp -d)"
          cp mdsmith demo.tape "$iso/"
          cp -r demo "$iso/demo"
          mkdir -p "$iso/plan"
          cp plan/*.md "$iso/plan/"
          mkdir -p "$iso/assets"

          # Rewrite Output path to the isolated assets dir
          sed -i "s|^Output assets/demo.gif|Output $iso/assets/demo.gif|" "$iso/demo.tape"

          (cd "$iso" && vhs demo.tape)

          # Copy only the GIF back
          cp "$iso/assets/demo.gif" assets/demo.gif
          rm -rf "$iso"

      - name: Reset working tree except demo GIF
        run: |
          # Save the generated GIF, reset the tree to undo
          # any changes from build/VHS/go-get (go.mod, etc.),
          # then restore only the GIF.
          cp assets/demo.gif /tmp/demo.gif
          git checkout -- .
          git clean -fd
          cp /tmp/demo.gif assets/demo.gif

      - name: Verify only demo.gif is staged
        run: |
          git add assets/demo.gif
          staged=$(git diff --staged --name-only)
          unexpected=$(echo "$staged" | grep -v '^assets/demo\.gif$' | grep -v '^$' || true)
          if [ -n "$unexpected" ]; then
            echo "ERROR: unexpected files staged:" >&2
            echo "$unexpected" >&2
            exit 1
          fi

      - name: Commit and push updated GIF
        run: |
          if [ -z "$(git diff --staged --name-only)" ]; then
            echo "assets/demo.gif unchanged — nothing to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update demo GIF"
          git push

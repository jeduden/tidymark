name: Record Secret Rotation

# Run from the Actions tab after rotating a long-lived publisher
# token at its issuer (VSCE_PAT on Azure DevOps, OVSX_PAT on
# Open VSX, MERGE_QUEUE_TOKEN on github.com). The workflow updates
# the `lastRotated` field in the matching per-secret file under
# docs/development/secret-rotations/ and opens a PR. CODEOWNERS
# gates the PR — the actual change to `main` still goes through
# the regular review-and-merge path.
#
# The PR body says `Closes #N` for the matching open reminder
# issue (the cron job opened earlier), so a single merge both
# records the rotation and closes the reminder.

on:
  workflow_dispatch:
    inputs:
      secret:
        # Free-form rather than `type: choice` so adding a new
        # tracked secret is one new file under
        # docs/development/secret-rotations/ — this workflow
        # does not also need to be updated. `mdsmith-release
        # record-rotation` (FindEntry inside) validates the
        # value against the per-secret titles and surfaces a
        # clear "unknown title 'X'; known: A, B, C" error.
        description: "Which secret was rotated (front-matter title)"
        required: true
        type: string
      date:
        description: "Rotation date (YYYY-MM-DD). Defaults to today."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  open-pr:
    runs-on: ubuntu-latest
    if: github.repository == 'jeduden/mdsmith'
    # `contents: write` for the branch push; `pull-requests: write`
    # for `gh pr create`; `issues: write` so the workflow can read
    # the open reminder issue (and the PR's `Closes #N` line takes
    # care of the close on merge).
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Match the rest of the workflows: never persist the
          # token in git config. The push step below authenticates
          # explicitly via a one-shot URL credential so the token
          # never lives outside that single command.
          persist-credentials: false
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          # Used by both the `record-rotation` subcommand and the
          # `mdsmith fix` step that regenerates the <?catalog?>
          # body in secret-rotations.md. Build from source to
          # match HEAD.
          go-version-file: go.mod
          cache: false
      - name: Resolve rotation date
        id: date
        shell: bash
        env:
          INPUT_DATE: ${{ inputs.date }}
        # `mdsmith-release record-rotation` also validates the
        # resolved date, but failing earlier with an annotated
        # `::error::` line on the dispatch form gives the
        # operator faster feedback. The regex is intentionally
        # loose (it accepts e.g. `2026-02-31`); the subcommand
        # rejects calendar-invalid dates via round-trip parsing.
        run: |
          set -euo pipefail
          if [ -z "$INPUT_DATE" ]; then
            INPUT_DATE=$(date -u +%Y-%m-%d)
          elif ! [[ "$INPUT_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::inputs.date must be YYYY-MM-DD (got '${INPUT_DATE}')"
            exit 1
          fi
          echo "value=$INPUT_DATE" >> "$GITHUB_OUTPUT"
      - name: Update front matter
        env:
          SECRET: ${{ inputs.secret }}
          ROTATION_DATE: ${{ steps.date.outputs.value }}
        run: go run ./cmd/mdsmith-release record-rotation "$SECRET" "$ROTATION_DATE"
      - name: Regenerate the secret-rotations catalog
        # docs/development/secret-rotations.md contains a <?catalog?>
        # row template that interpolates `lastRotated` from the
        # per-secret files we just changed. Without this step the
        # catalog body would lag the per-secret file and the next
        # `mdsmith check` run on main would flag MDS019 stale-body.
        # The fix runs against the canonical catalog file only; the
        # commit step below stages the file when it changes.
        run: go run ./cmd/mdsmith fix docs/development/secret-rotations.md
      - name: Find the open reminder issue
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
          SECRET: ${{ inputs.secret }}
        run: |
          # Match the title pattern check-secret-rotations.ts opens:
          # `Rotate <SECRET> (lastRotated <date>)`. `gh issue list`
          # does not document a stable ordering, so sort the filtered
          # results by issue number (newest first) and take the top
          # entry. If multiple reminders exist for the same secret
          # (e.g. someone opened a manual one), the most recently
          # created one is the one to close.
          number=$(gh issue list \
            --state open \
            --label secret-rotation \
            --search "in:title \"Rotate $SECRET (\"" \
            --json number,title \
            --jq "[.[] | select(.title | startswith(\"Rotate $SECRET (\"))] | sort_by(.number) | reverse | .[0].number // empty")
          echo "number=$number" >> "$GITHUB_OUTPUT"
      - name: Commit, push, open PR
        # Explicit `shell: bash` so `set -euo pipefail` below has
        # bash semantics on every runner image, not whatever shell
        # a future default happens to be.
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SECRET: ${{ inputs.secret }}
          ROTATION_DATE: ${{ steps.date.outputs.value }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          set -euo pipefail
          # Stage the change first. If record-rotation.ts was a
          # no-op (the date was already the requested value) there
          # is nothing to commit — surface that as a workflow
          # notice and exit clean WITHOUT creating a branch or
          # pushing anything, so a re-run on the same date never
          # accumulates remote orphan branches.
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # The record-rotation script edits the per-secret file
          # under docs/development/secret-rotations/, and the
          # preceding `mdsmith fix` step regenerates the
          # <?catalog?> body in docs/development/secret-rotations.md
          # whose row template interpolates lastRotated. Stage both
          # paths so the PR carries the synchronized change.
          git add docs/development/secret-rotations/ \
                  docs/development/secret-rotations.md
          if git diff --staged --quiet; then
            echo "::notice::$SECRET is already at $ROTATION_DATE — no PR opened"
            exit 0
          fi
          branch="security/record-rotation-${SECRET}-${ROTATION_DATE}"
          git checkout -b "$branch"
          git commit -m "chore(security): record $SECRET rotation on $ROTATION_DATE"
          # Authenticate via http.extraheader rather than embedding
          # the token in the URL — git's error output and any
          # `set -x` style command echo would otherwise expose
          # the resolved token even though GitHub Actions masks
          # it in workflow logs. The header value matches the
          # format actions/checkout uses internally: Basic auth
          # with a base64-encoded `x-access-token:<token>` pair.
          # GitHub Actions auto-masks the literal GITHUB_TOKEN
          # value but not arbitrary transformations of it, so
          # explicitly register the encoded header with
          # ::add-mask:: before it ever reaches a step that
          # might echo it (a future `set -x`, a git error path,
          # or a transitive log of the env).
          auth_header=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)
          echo "::add-mask::$auth_header"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            push origin "HEAD:refs/heads/${branch}"

          # Idempotently bootstrap the `secret-rotation` label. The
          # reminder workflow (secret-rotation-reminder.yml) does the
          # same thing on its first run, but this workflow can be
          # triggered manually before the reminder has ever fired,
          # so it must not depend on that ordering.
          #
          # No `|| true` here: `gh pr create` below passes
          # `--label secret-rotation`, which fails the PR call if
          # the label is missing. Letting label creation fail
          # silently would leave the workflow in a broken state on
          # the very first run. `--force` makes label create
          # idempotent on subsequent runs, so failing hard only
          # surfaces real configuration / API problems.
          gh label create secret-rotation \
            --force \
            --color C5DEF5 \
            --description "Long-lived secret is due (or overdue) for rotation"

          closes=""
          if [ -n "$ISSUE_NUMBER" ]; then
            closes="Closes #${ISSUE_NUMBER}"
          fi
          body=$(cat <<EOF
          Records the rotation of \`$SECRET\` on $ROTATION_DATE.

          The new \`lastRotated\` value resets the rotation clock.
          \`secret-rotation-reminder.yml\` runs monthly and opens
          the next reminder when the secret is within 30 days of
          its period — for a 335-day period, that's roughly 305
          days after this rotation.

          $closes
          EOF
          )
          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(security): record $SECRET rotation on $ROTATION_DATE" \
            --body "$body" \
            --label secret-rotation

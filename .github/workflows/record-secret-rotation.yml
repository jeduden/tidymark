name: Record Secret Rotation

# Run from the Actions tab after rotating a long-lived publisher
# token at its issuer (VSCE_PAT on Azure DevOps, OVSX_PAT on
# Open VSX, MERGE_QUEUE_TOKEN on github.com). The workflow updates
# the `last-rotated` date in docs/development/secret-rotations.md
# and opens a PR. CODEOWNERS gates the PR — the actual change to
# `main` still goes through the regular review-and-merge path.
#
# The PR body says `Closes #N` for the matching open reminder
# issue (the cron job opened earlier), so a single merge both
# records the rotation and closes the reminder.

on:
  workflow_dispatch:
    inputs:
      secret:
        description: "Which secret was rotated"
        required: true
        type: choice
        options:
          - VSCE_PAT
          - OVSX_PAT
          - MERGE_QUEUE_TOKEN
      date:
        description: "Rotation date (YYYY-MM-DD). Defaults to today."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  open-pr:
    runs-on: ubuntu-latest
    if: github.repository == 'jeduden/mdsmith'
    # `contents: write` for the branch push; `pull-requests: write`
    # for `gh pr create`; `issues: write` so the workflow can read
    # the open reminder issue (and the PR's `Closes #N` line takes
    # care of the close on merge).
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # The push step needs an authenticated remote; the default
          # GITHUB_TOKEN is fine because branch protection only
          # blocks merge to `main`, not pushing a feature branch.
          persist-credentials: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install PyYAML
        # `python -m pip` ensures the install lands in the
        # interpreter selected by actions/setup-python above,
        # not whichever pip happens to be first on PATH.
        run: python -m pip install --no-deps pyyaml==6.0.2
      - name: Resolve rotation date
        id: date
        env:
          INPUT_DATE: ${{ inputs.date }}
        run: |
          if [ -z "$INPUT_DATE" ]; then
            INPUT_DATE=$(date -u +%Y-%m-%d)
          fi
          echo "value=$INPUT_DATE" >> "$GITHUB_OUTPUT"
      - name: Update front matter
        env:
          SECRET: ${{ inputs.secret }}
          ROTATION_DATE: ${{ steps.date.outputs.value }}
        run: |
          python3 .github/scripts/record-rotation.py "$SECRET" "$ROTATION_DATE"
      - name: Find the open reminder issue
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SECRET: ${{ inputs.secret }}
        run: |
          # Match the title pattern check-secret-rotations.py opens:
          # `Rotate <SECRET> (last rotated <date>)`. `gh issue list`
          # does not document a stable ordering, so sort the filtered
          # results by issue number (newest first) and take the top
          # entry. If multiple reminders exist for the same secret
          # (e.g. someone opened a manual one), the most recently
          # created one is the one to close.
          number=$(gh issue list \
            --state open \
            --label secret-rotation \
            --search "in:title Rotate $SECRET" \
            --json number,title \
            --jq "[.[] | select(.title | startswith(\"Rotate $SECRET (\"))] | sort_by(.number) | reverse | .[0].number // empty")
          echo "number=$number" >> "$GITHUB_OUTPUT"
      - name: Commit, push, open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SECRET: ${{ inputs.secret }}
          ROTATION_DATE: ${{ steps.date.outputs.value }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          set -euo pipefail
          branch="claude/record-rotation-${SECRET}-${ROTATION_DATE}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add docs/development/secret-rotations.md
          if git diff --staged --quiet; then
            echo "no change — last-rotated already at $ROTATION_DATE"
            exit 0
          fi
          git commit -m "chore(security): record $SECRET rotation on $ROTATION_DATE"
          git push -u origin "$branch"

          # Idempotently bootstrap the `secret-rotation` label. The
          # reminder workflow (secret-rotation-reminder.yml) does the
          # same thing on its first run, but this workflow can be
          # triggered manually before the reminder has ever fired,
          # so it must not depend on that ordering.
          gh label create secret-rotation \
            --force \
            --color C5DEF5 \
            --description "Long-lived secret is due (or overdue) for rotation"

          closes=""
          if [ -n "$ISSUE_NUMBER" ]; then
            closes="Closes #${ISSUE_NUMBER}"
          fi
          body=$(cat <<EOF
          Records the rotation of \`$SECRET\` on $ROTATION_DATE.

          The new \`last-rotated\` date resets the rotation clock.
          \`secret-rotation-reminder.yml\` runs monthly and opens
          the next reminder when the secret is within 30 days of
          its period — for a 335-day period, that's roughly 305
          days after this rotation.

          $closes
          EOF
          )
          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(security): record $SECRET rotation on $ROTATION_DATE" \
            --body "$body" \
            --label secret-rotation

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          bin="mdsmith-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "$bin" ./cmd/mdsmith
          echo "bin=$bin" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mdsmith-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.bin }}

  vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # Install bun from a pinned release archive with SHA-256
      # verification — see ci.yml for the rationale.
      - name: Install Bun
        env:
          BUN_VERSION: "1.3.11"
          BUN_SHA256: "8611ba935af886f05a6f38740a15160326c15e5d5d07adef966130b4493607ed"
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.bun/bin"
          tmp=$(mktemp --suffix=.zip)
          curl -fsSL --proto '=https' --tlsv1.2 \
            -o "$tmp" \
            "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-x64.zip"
          echo "${BUN_SHA256}  ${tmp}" | sha256sum -c -
          unzip -q "$tmp" -d "$HOME/.bun"
          mv "$HOME/.bun/bun-linux-x64/bun" "$HOME/.bun/bin/bun"
          rm -rf "$HOME/.bun/bun-linux-x64" "$tmp"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
      - name: Install extension dependencies
        working-directory: editors/vscode
        run: bun install --frozen-lockfile
      - name: Run extension unit tests
        working-directory: editors/vscode
        run: bun test
      - name: Compile extension
        working-directory: editors/vscode
        run: bun run build.ts --production
      - name: Package .vsix
        env:
          VERSION: ${{ github.ref_name }}
        working-directory: editors/vscode
        run: |
          # Strip the leading 'v' so the .vsix carries a clean SemVer.
          ver="${VERSION#v}"
          bunx --bun @vscode/vsce package --no-dependencies \
            --out "mdsmith-${ver}.vsix"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mdsmith-vscode-extension
          path: editors/vscode/mdsmith-*.vsix

  release:
    needs: [build, vscode]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          merge-multiple: true
      - name: Create checksums
        run: sha256sum mdsmith-* > checksums.txt
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          generate_release_notes: true
          files: |
            mdsmith-*
            checksums.txt

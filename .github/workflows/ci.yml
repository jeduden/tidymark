name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install zizmor
        run: pip install zizmor==1.6.0
      - name: Run zizmor
        run: zizmor --format sarif . > results.sarif
      - name: Upload SARIF
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          sarif_file: results.sarif

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
      - run: go tool golangci-lint run

  mdsmith:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
      - run: go build -o mdsmith ./cmd/mdsmith
      - run: ./mdsmith check .

  demo:
    uses: ./.github/workflows/record-demo.yml
    with:
      # MP4 skips the slow GIF palette-quantization encoding pass.
      # The published GIF is produced separately by demo.yml.
      output_format: mp4

  lsp-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
      # Plan 121: enforce p95 squiggle-update budget
      # (150 ms / 1k lines, 500 ms / 5k lines).
      - run: go test -run=^$ -bench=. -benchtime=20x ./internal/lsp/...

  vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # Install bun directly rather than via oven-sh/setup-bun: the
      # action enables the GitHub Actions tool cache by default, which
      # zizmor's cache-poisoning rule flags as an unprotected
      # mutation surface. We download a pinned release zip from the
      # bun GitHub release page and verify its SHA-256 before
      # extracting, which avoids piping arbitrary remote shell
      # script into bash.
      - name: Install Bun
        env:
          BUN_VERSION: "1.3.11"
          BUN_SHA256: "8611ba935af886f05a6f38740a15160326c15e5d5d07adef966130b4493607ed"
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.bun/bin"
          tmp=$(mktemp --suffix=.zip)
          curl -fsSL --proto '=https' --tlsv1.2 \
            -o "$tmp" \
            "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-x64.zip"
          echo "${BUN_SHA256}  ${tmp}" | sha256sum -c -
          unzip -q "$tmp" -d "$HOME/.bun"
          mv "$HOME/.bun/bun-linux-x64/bun" "$HOME/.bun/bin/bun"
          rm -rf "$HOME/.bun/bun-linux-x64" "$tmp"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
      - name: Install extension dependencies
        working-directory: editors/vscode
        run: bun install --frozen-lockfile
      - name: Run extension unit tests
        working-directory: editors/vscode
        run: bun test
      - name: Compile extension
        working-directory: editors/vscode
        run: bun run build.ts --production
      - name: Package .vsix
        working-directory: editors/vscode
        run: bunx --bun @vscode/vsce package --no-dependencies --out mdsmith.vsix
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mdsmith-vscode-extension
          path: editors/vscode/mdsmith.vsix

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
      - name: Install mdsmith
        run: go install ./cmd/mdsmith
      - name: Run tests with coverage
        run: |
          mkdir -p "$GITHUB_WORKSPACE/e2e-cover"
          E2E_COVERDIR="$GITHUB_WORKSPACE/e2e-cover" go test -covermode=atomic -coverprofile=unit.cov ./...
      - name: Merge coverage profiles
        run: |
          head -1 unit.cov > merged.cov
          # Include all unit-test coverage; cmd/mdsmith functions exercised
          # only via the subprocess binary will have count 0 here but will
          # be supplemented by the e2e profile below.
          tail -n +2 unit.cov >> merged.cov
          e2e_profile="$GITHUB_WORKSPACE/e2e-cover/e2e_coverage.txt"
          if [ ! -f "$e2e_profile" ]; then
            echo "e2e_coverage.txt not found — cmd/mdsmith coverage will be missing" >&2
            exit 1
          fi
          unit_mode_line=$(head -1 unit.cov)
          e2e_mode_line=$(head -1 "$e2e_profile")
          if [ "$unit_mode_line" != "$e2e_mode_line" ]; then
            echo "Coverage mode mismatch: unit='$unit_mode_line' e2e='$e2e_mode_line'" >&2
            exit 1
          fi
          e2e_lines=$(tail -n +2 "$e2e_profile" | grep -c 'cmd/mdsmith/' || true)
          if [ "$e2e_lines" -eq 0 ]; then
            echo "e2e profile contains no cmd/mdsmith/ coverage lines" >&2
            exit 1
          fi
          tail -n +2 "$e2e_profile" | grep 'cmd/mdsmith/' >> merged.cov
      - name: Coverage summary
        run: |
          total=$(go tool cover -func=merged.cov | tail -1)
          {
            echo '## Test Coverage'
            echo '```'
            echo "$total"
            echo '```'
            echo ''
            echo '<details><summary>Per-package breakdown</summary>'
            echo ''
            echo '```'
            go tool cover -func=merged.cov
            echo '```'
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          use_oidc: true
          files: merged.cov
          fail_ci_if_error: false

name: Setup Bun
description: >-
  Install and pin the repo-wide bun version. The single source
  of truth for the bun version across every workflow that runs
  TypeScript via bun — currently ci.yml (vscode-extension job)
  and release.yml (vscode job). Bumping bun = one edit here.

runs:
  using: composite
  steps:
    # `no-cache: true` disables the GitHub Actions tool cache
    # that zizmor's cache-poisoning rule flags as an unprotected
    # mutation surface in security-sensitive workflows; the
    # action still downloads and verifies the bun release from
    # oven-sh/bun for each run.
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: "1.3.11"
        no-cache: true

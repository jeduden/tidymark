kinds:
  plan:
    rules:
      max-file-length:
        max: 800
      paragraph-readability: false
  prompt:
    rules:
      max-file-length:
        max: 200
      line-length:
        max: 100

kind-assignment:
  - glob: ["plan/*.md"]
    kinds: [plan]
  - glob: ["prompt/*.md"]
    kinds: [prompt]

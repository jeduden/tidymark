coverage:
  status:
    project:
      # The strict (threshold: 0%) gate applies only to the
      # established flags. A new flag starts with no baseline so
      # leaving it under `default` would flip project status red
      # on the introduction commit even though net coverage rose.
      default:
        target: auto
        threshold: 0%
        flags:
          - go
          - typescript
      # The `scripts` flag is informational until a baseline
      # accumulates on `main`. Flip `informational` off (or drop
      # this stanza so `default` picks it up) once the rolling
      # coverage stabilizes.
      scripts:
        flags:
          - scripts
        informational: true
    patch:
      default:
        target: auto
        threshold: 0%
        flags:
          - go
          - typescript
      scripts:
        flags:
          - scripts
        informational: true
    # Per-file gate: fail the status check if any
    # file's coverage decreased vs the base commit.
    changes:
      default:
        enabled: true
        target: auto
        threshold: 0%

# Coverage is uploaded with a flag per language so each report
# only contains the files it actually measured. Without flags,
# Codecov treats unmeasured files (the entire other-language
# tree) as 0% coverage, which is misleading.
flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: go
      paths:
        - "**/*.go"
    - name: typescript
      paths:
        - "editors/vscode/src/**"
    - name: scripts
      paths:
        - ".github/scripts/**"

component_management:
  individual_components:
    - component_id: go
      name: Go
      paths:
        - "**/*.go"
    - component_id: typescript
      name: TypeScript
      paths:
        - "editors/vscode/src/**"
    - component_id: scripts
      name: CI Scripts
      paths:
        - ".github/scripts/**"

comment:
  layout: "condensed_header, condensed_files, condensed_footer, components"
  require_changes: true

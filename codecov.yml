coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0%
    patch:
      default:
        target: auto
        threshold: 0%
    # Per-file gate: fail the status check if any
    # file's coverage decreased vs the base commit.
    changes:
      default:
        enabled: true

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  require_changes: true

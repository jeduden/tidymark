hero:
  eyebrow: "Markdown linter · written in Go"
  headline_pre: "Mark"
  headline_em: "down"
  headline_post: ", smithed."
  lead: >-
    Fast checks for style, readability, structure, and cross-file integrity.
    Auto-fix what fixes cleanly. Editor-grade diagnostics on every save.

features:
  - icon: wrench
    title: "Auto-fix Markdown formatting"
    body: >-
      <code>mdsmith fix</code> rewrites whitespace, headings, code fences,
      bare URLs, list indentation, and table alignment in place, looping up to
      10 passes and stopping when edits stabilize.
      <code>mdsmith check</code> is the read-only CI sibling.
  - icon: edit-3
    title: "Live diagnostics wherever you write"
    body: >-
      <code>mdsmith lsp</code> emits diagnostics, quick-fixes, and navigation —
      definition, references, symbol search, and a call-hierarchy over
      <code>&lt;?include?&gt;</code>, <code>&lt;?catalog?&gt;</code>, and cross-file links —
      consumed by any LSP-aware editor.
  - icon: link
    title: "Cross-file integrity"
    body: >-
      Built-in rules flag broken links and missing anchors, enforce per-file
      section schemas, and keep Markdown in the right folders. Schemas can be
      inline on a file kind or shared via <code>proto.md</code> files.
    rules: ["MDS027", "MDS020", "MDS033"]
  - icon: bot
    title: "Guardrails for AI-generated docs"
    body: >-
      Cap file, section, and token-budget size; enforce reading grade and
      sentence count; flag verbatim copy-paste across files.
    rules: ["MDS022", "MDS028", "MDS037"]
  - icon: list-checks
    title: "Self-maintaining sections"
    body: >-
      On <code>mdsmith fix</code>, <code>&lt;?toc?&gt;</code> rebuilds a heading
      TOC, <code>&lt;?catalog?&gt;</code> generates an index from front matter,
      and <code>&lt;?include?&gt;</code> splices in another file. A Git merge
      driver auto-resolves conflicts inside those blocks.
  - icon: gauge
    title: "Gate releases on doc status"
    body: >-
      <code>mdsmith list query 'status: "✅"' plan/</code> selects files by a
      CUE expression on front matter; <code>mdsmith metrics rank</code> ranks
      files by any shared metric — both ready to pipe into a release script.

install:
  - id: go
    label: "go"
    prompt: "$"
    cmd: "go install"
    args: "github.com/jeduden/mdsmith/cmd/mdsmith@latest"
  - id: npm
    label: "npm"
    prompt: "$"
    cmd: "npm install -g"
    args: "@mdsmith/cli"
  - id: pip
    label: "pip"
    prompt: "$"
    cmd: "pip install"
    args: "mdsmith"
  - id: vscode
    label: "vs code"
    prompt: "$"
    cmd: "code --install-extension"
    args: "jeduden.mdsmith"
  - id: claude
    label: "claude code"
    prompt: "/"
    cmd: "plugin marketplace add"
    args: "jeduden/mdsmith"

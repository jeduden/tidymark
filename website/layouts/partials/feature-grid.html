<div class="feature-grid">
  {{ range site.Data.homepage.features }}
    <div class="feature-card">
      <span class="icon">
        <i data-lucide="{{ .icon }}" width="18" height="18"></i>
      </span>
      <h3>{{ .title }}</h3>
      <p>{{ .body | safeHTML }}</p>
      {{ with .rules }}
        <div>
          {{ range . }}<span class="rule-chip">{{ . }}</span>{{ end }}
        </div>
      {{ end }}
    </div>
  {{ end }}
</div>

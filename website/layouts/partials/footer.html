<footer class="footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-col">
        <a class="topnav-brand" href="{{ "/" | relURL }}" aria-label="mdsmith home">
          <img src="{{ "img/logo-lockup.svg" | relURL }}" width="117" height="26" alt="mdsmith">
        </a>
        <p class="footer-tagline">{{ .Site.Params.description }}</p>
      </div>
      <div class="footer-col">
        <h4>Product</h4>
        <a href="{{ "/guides/install/" | relURL }}">Install</a>
        <a href="{{ "/reference/cli/" | relURL }}">CLI reference</a>
        <a href="{{ "/guides/editors/vscode/" | relURL }}">VS Code extension</a>
        <a href="{{ "/background/markdown-linters/" | relURL }}">vs other linters</a>
      </div>
      <div class="footer-col">
        <h4>Resources</h4>
        <a href="{{ "/guides/" | relURL }}">Guides</a>
        <a href="{{ "/reference/conventions/" | relURL }}">Conventions</a>
        <a href="{{ "/development/" | relURL }}">Development</a>
      </div>
      <div class="footer-col">
        <h4>Community</h4>
        <a href="https://github.com/{{ .Site.Params.githubRepo }}" rel="noopener">GitHub</a>
        <a href="https://github.com/{{ .Site.Params.githubRepo }}/issues" rel="noopener">Issues</a>
        <a href="https://github.com/{{ .Site.Params.githubRepo }}/releases" rel="noopener">Releases</a>
        <a href="https://github.com/{{ .Site.Params.githubRepo }}/blob/main/LICENSE" rel="noopener">License (MIT)</a>
      </div>
    </div>
    <div class="footer-meta">
      <span>© {{ now.Year }} mdsmith contributors</span>
      <span>v{{ .Site.Params.version }}</span>
    </div>
  </div>
</footer>
